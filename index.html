<!DOCTYPE html>
<html>
<head>
    <title>Connect 4 Multiplayer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Connect 4</h1>

<button id="connectBtn">Connect Wallet</button>
<p id="playerName">Not connected</p>

<br>

<input id="roomInput" placeholder="Room ID">
<button onclick="createRoom()">Create Room</button>
<button onclick="joinRoom()">Join Room</button>

<br><br>

<div id="board"></div>

<script src="https://unpkg.com/@unicitylabs/sphere-sdk/dist/browser/sphere-sdk.min.js"></script>

<script src="game.js"></script>
<script src="multiplayer.js"></script>

<script>
let sphere;

async function connectWallet() {
    try {
        sphere = new window.unicity.Sphere();
        const identity = await sphere.connect();

        document.getElementById("playerName").innerText =
            "Connected: " + identity.nametag;

    } catch (e) {
        console.error(e);
        alert("Wallet connection failed");
    }
}

document.getElementById("connectBtn").addEventListener("click", connectWallet);
</script>

</body>
</html>
