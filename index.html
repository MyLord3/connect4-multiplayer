<!DOCTYPE html>
<html>
<head>
    <title>Connect 4 Multiplayer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Connect 4</h1>

<button id="connectBtn">Connect Wallet</button>
<p id="playerName">Not connected</p>

<br>

<input id="roomInput" placeholder="Room ID">
<button onclick="createRoom()">Create Room</button>
<button onclick="joinRoom()">Join Room</button>

<br><br>

<div id="board"></div>

<script src="game.js"></script>
<script src="multiplayer.js"></script>

<script type="module">
import { connectSphere } from "./sphere-connect.js";

document.getElementById("connectBtn").onclick = async () => {
    const identity = await connectSphere();
    if(identity){
        document.getElementById("playerName").innerText =
            "Connected: " + identity.nametag;
    } else {
        alert("Wallet connection failed");
    }
};
</script>

</body>
</html>
