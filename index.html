<!DOCTYPE html>
<html>
<head>
    <title>Connect 4 Multiplayer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Connect 4</h1>

<button id="connectBtn">Connect Wallet</button>
<p id="playerName">Not connected</p>

<br>

<input id="roomInput" placeholder="Room ID">
<button onclick="createRoom()">Create Room</button>
<button onclick="joinRoom()">Join Room</button>

<br><br>

<div id="board"></div>

<script src="game.js"></script>
<script src="multiplayer.js"></script>

<script type="module">
import { SphereClient } from "https://cdn.jsdelivr.net/npm/@unicitylabs/sphere-sdk/+esm";

const client = new SphereClient();

document.getElementById("connectBtn").onclick = async () => {
    try {
        const identity = await client.connect();
        document.getElementById("playerName").innerText =
            "Connected: " + identity.nametag;
    } catch (e) {
        console.log(e);
        alert("Wallet connection failed");
    }
};
</script>

</body>
</html>
